<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Гримуар</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #1d182e;
  color: #e8e2f5;
  font-family: 'DM Sans', sans-serif;
  font-weight: 300;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

/* Звёздный фон */
.stars {
  position: fixed;
  inset: 0;
  pointer-events: none;
}
.star {
  position: absolute;
  border-radius: 50%;
  background: white;
  animation: twinkle var(--d) ease-in-out infinite;
  animation-delay: var(--delay);
}
@keyframes twinkle {
  0%, 100% { opacity: var(--min); }
  50% { opacity: var(--max); }
}

/* Свечение снизу */
.glow {
  position: fixed;
  bottom: -200px;
  left: 50%;
  transform: translateX(-50%);
  width: 600px;
  height: 400px;
  background: radial-gradient(ellipse, rgba(120,80,200,0.18) 0%, transparent 70%);
  pointer-events: none;
}

.center {
  position: relative;
  text-align: center;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0;
}

.rune-top {
  font-family: 'Cormorant Garamond', serif;
  font-size: 13px;
  font-style: italic;
  color: rgba(167,139,250,0.4);
  letter-spacing: 0.4em;
  text-transform: uppercase;
  margin-bottom: 2rem;
  animation: fadeIn 2s ease forwards;
}

.title {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(64px, 10vw, 100px);
  font-weight: 300;
  color: #e8e2f5;
  line-height: 1;
  letter-spacing: -0.02em;
  margin-bottom: 0.2rem;
  animation: fadeIn 2s ease 0.3s both;
}

.title em {
  font-style: italic;
  color: #c4b0fc;
}

.subtitle {
  font-family: 'Cormorant Garamond', serif;
  font-size: 18px;
  font-style: italic;
  font-weight: 300;
  color: rgba(157,146,184,0.7);
  margin-bottom: 3.5rem;
  letter-spacing: 0.05em;
  animation: fadeIn 2s ease 0.6s both;
}

/* Разделитель */
.ornament {
  color: rgba(167,139,250,0.3);
  font-size: 20px;
  letter-spacing: 0.5em;
  margin-bottom: 3.5rem;
  animation: fadeIn 2s ease 0.8s both;
}

.enter-btn {
  font-family: 'Cormorant Garamond', serif;
  font-size: 16px;
  font-weight: 400;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: #c4b0fc;
  background: transparent;
  border: 1px solid rgba(167,139,250,0.35);
  padding: 16px 48px;
  border-radius: 2px;
  cursor: pointer;
  text-decoration: none;
  display: inline-block;
  transition: all 0.4s ease;
  position: relative;
  animation: fadeIn 2s ease 1.1s both;
}

.enter-btn::before,
.enter-btn::after {
  content: '✦';
  font-size: 10px;
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  color: rgba(167,139,250,0.5);
  transition: all 0.4s ease;
}
.enter-btn::before { left: 18px; }
.enter-btn::after { right: 18px; }

.enter-btn:hover {
  color: #e8e2f5;
  border-color: rgba(167,139,250,0.7);
  background: rgba(167,139,250,0.07);
  letter-spacing: 0.35em;
}

.enter-btn:hover::before { left: 14px; }
.enter-btn:hover::after { right: 14px; }

/* Подпись снизу */
.footer-text {
  position: fixed;
  bottom: 2rem;
  font-size: 11px;
  color: rgba(157,146,184,0.3);
  letter-spacing: 0.1em;
  animation: fadeIn 3s ease 1.5s both;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}
</style>
</head>
<body>

<div class="stars" id="stars"></div>
<div class="glow"></div>

<div class="center">
  <div class="rune-top">Академия тёмных искусств</div>
  <h1 class="title"><em>Гримуар</em></h1>
  <p class="subtitle">хранилище знаний и домашних работ</p>
  <div class="ornament">· · ✦ · ·</div>
  <a href="subjects.html" class="enter-btn">Войти в архив</a>
</div>

<div class="footer-text">Nox perpetua · Scientia aeterna</div>

<script>
const container = document.getElementById('stars');
for (let i = 0; i < 120; i++) {
  const s = document.createElement('div');
  s.className = 'star';
  const size = Math.random() * 2 + 0.5;
  const min = (Math.random() * 0.2 + 0.05).toFixed(2);
  const max = (Math.random() * 0.6 + 0.3).toFixed(2);
  const dur = (Math.random() * 4 + 2).toFixed(1) + 's';
  const delay = (Math.random() * 5).toFixed(1) + 's';
  s.style.cssText = `
    width:${size}px; height:${size}px;
    top:${Math.random()*100}%; left:${Math.random()*100}%;
    --min:${min}; --max:${max}; --d:${dur}; --delay:${delay};
    opacity:${min};
  `;
  container.appendChild(s);
}
</script>
</body>
</html>
